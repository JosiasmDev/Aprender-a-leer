<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aprendo a leer</title>
<style>
  :root{
    --cream:#FFF9EC;
    --ink:#3A3042;
    --coral:#FF8552;
    --coral-dark:#E06A3C;
    --teal:#3DAFA5;
    --teal-dark:#2C8A81;
    --purple:#8E5DC9;
    --purple-dark:#6E43A6;
    --yellow:#FFC93F;
    --yellow-dark:#E0AC1E;
    --pink:#FF6B9D;
    --pink-dark:#E14E80;
    --green:#52B788;
    --green-dark:#3A9C6C;
    --blue:#4C9BE8;
    --blue-dark:#3679C4;
    --white:#FFFFFF;
    --grey:#C9C2D6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:'Baloo 2','Segoe UI Rounded','SF Pro Rounded','Comic Sans MS',system-ui,sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;
  }
  body{
    background-image:
      radial-gradient(circle at 10% 15%, rgba(255,201,63,0.25) 0, transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(61,175,165,0.2) 0, transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(142,93,201,0.18) 0, transparent 40%),
      radial-gradient(circle at 5% 90%, rgba(255,107,157,0.18) 0, transparent 40%);
  }
  h1,h2,h3{font-weight:800;margin:0;letter-spacing:0.5px;}
  #app{max-width:640px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:24px;}
  .screen{display:none;padding:20px 18px 40px;animation:fadeIn .35s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- Buttons (huggable rubber style) ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    border:none;border-radius:20px;
    padding:16px 26px;
    font-family:inherit;font-weight:800;font-size:1.1rem;
    color:var(--white);
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,0.18);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn:active{transform:translateY(6px);box-shadow:0 0 0 rgba(0,0,0,0.18);}
  .btn-coral{background:var(--coral);box-shadow:0 6px 0 var(--coral-dark);}
  .btn-coral:active{box-shadow:0 0 0 var(--coral-dark);}
  .btn-teal{background:var(--teal);box-shadow:0 6px 0 var(--teal-dark);}
  .btn-teal:active{box-shadow:0 0 0 var(--teal-dark);}
  .btn-purple{background:var(--purple);box-shadow:0 6px 0 var(--purple-dark);}
  .btn-purple:active{box-shadow:0 0 0 var(--purple-dark);}
  .btn-yellow{background:var(--yellow);color:var(--ink);box-shadow:0 6px 0 var(--yellow-dark);}
  .btn-yellow:active{box-shadow:0 0 0 var(--yellow-dark);}
  .btn-outline{background:var(--white);color:var(--ink);box-shadow:0 6px 0 var(--grey);}
  .btn-outline:active{box-shadow:0 0 0 var(--grey);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn:disabled:active{transform:none;}

  /* ---------- Name screen ---------- */
  #screen-name{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:92vh;text-align:center;}
  .mascot{font-size:5.5rem;line-height:1;margin-bottom:6px;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
  #screen-name h1{font-size:1.9rem;color:var(--coral);margin-bottom:6px;}
  #screen-name p{color:#6b6178;font-size:1.05rem;margin:0 0 22px;}
  .name-input{
    width:100%;max-width:320px;
    padding:16px 20px;border-radius:18px;border:3px solid var(--grey);
    font-family:inherit;font-size:1.3rem;text-align:center;font-weight:700;
    color:var(--ink);background:var(--white);margin-bottom:20px;
  }
  .name-input:focus{outline:none;border-color:var(--teal);}

  /* ---------- Map screen ---------- */
  .map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .greeting{font-size:1.5rem;color:var(--coral);}
  .greeting span{display:block;font-size:0.95rem;color:#8a8195;font-weight:600;}
  .stars-total{
    display:flex;align-items:center;gap:6px;background:var(--white);
    padding:8px 14px;border-radius:16px;box-shadow:0 3px 0 var(--grey);
    font-weight:800;color:var(--yellow-dark);font-size:1.05rem;
  }
  .gear-btn{
    background:var(--white);border:none;border-radius:14px;width:44px;height:44px;
    font-size:1.3rem;box-shadow:0 3px 0 var(--grey);cursor:pointer;
  }
  .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;}

  /* ---- Camino con mundos ---- */
  .path{position:relative;padding:6px 10px 10px;}
  .world-block{position:relative;margin-bottom:6px;}
  .world-banner{
    position:relative;z-index:2;
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;border-radius:22px;margin:26px 0 22px;
    color:#fff;box-shadow:0 6px 0 rgba(0,0,0,0.15);
    overflow:hidden;
  }
  .world-banner::after{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(circle at 90% 20%, rgba(255,255,255,0.25) 0, transparent 45%);
  }
  .world-banner .w-icon{font-size:2.1rem;flex:none;filter:drop-shadow(0 2px 0 rgba(0,0,0,0.1));}
  .world-banner .w-text{position:relative;z-index:1;}
  .world-banner .w-title{font-size:1.15rem;font-weight:800;}
  .world-banner .w-sub{font-size:0.82rem;opacity:0.92;font-weight:600;}
  .world-1 .world-banner{background:linear-gradient(120deg,var(--teal),var(--teal-dark));}
  .world-2 .world-banner{background:linear-gradient(120deg,var(--coral),var(--coral-dark));}
  .world-3 .world-banner{background:linear-gradient(120deg,var(--purple),var(--purple-dark));}
  .world-4 .world-banner{background:linear-gradient(120deg,var(--pink),var(--pink-dark));}

  .trail{position:relative;padding:10px 10px 4px;}
  .trail::before{
    content:"";position:absolute;top:0;bottom:0;left:50%;
    width:8px;margin-left:-4px;border-radius:8px;z-index:0;
    background-image:repeating-linear-gradient(to bottom, var(--trail-color,var(--grey)) 0 14px, transparent 14px 26px);
    opacity:0.8;
  }
  .world-1 .trail{--trail-color:var(--teal);}
  .world-2 .trail{--trail-color:var(--coral);}
  .world-3 .trail{--trail-color:var(--purple);}
  .world-4 .trail{--trail-color:var(--pink);}

  .deco{position:absolute;font-size:1.4rem;opacity:0.55;z-index:0;pointer-events:none;}

  .stone-row{position:relative;display:flex;align-items:center;margin-bottom:24px;z-index:1;}
  .stone-row.left{justify-content:flex-start;}
  .stone-row.right{justify-content:flex-end;}
  .stone{
    width:120px;background:var(--white);border-radius:24px;
    padding:14px 10px 12px;text-align:center;
    box-shadow:0 6px 0 var(--grey);
    cursor:pointer;position:relative;
  }
  .stone.unlocked{box-shadow:0 6px 0 var(--coral-dark);background:linear-gradient(160deg,#fff, #fff4ea);}
  .stone.completed{box-shadow:0 6px 0 var(--green-dark);background:linear-gradient(160deg,#fff, #eafff3);}
  .stone.locked{opacity:.55;cursor:default;}
  .stone:active.unlocked, .stone:active.completed{transform:translateY(6px);box-shadow:0 0 0;}
  .stone-icon{font-size:2.2rem;}
  .stone-title{font-size:0.8rem;font-weight:800;margin-top:4px;line-height:1.1;min-height:2.1em;}
  .stone-stars{font-size:0.85rem;color:var(--yellow-dark);margin-top:4px;letter-spacing:1px;}
  .lock-badge{
    position:absolute;top:-8px;right:-8px;background:var(--grey);color:#fff;
    border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;
  }
  .current-badge{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    background:var(--yellow);color:var(--ink);font-size:0.68rem;font-weight:800;
    padding:3px 9px;border-radius:10px;box-shadow:0 3px 0 var(--yellow-dark);
    white-space:nowrap;animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.08);}}
  .finish-flag{
    text-align:center;font-size:2.6rem;margin:12px 0 4px;
  }

  /* ---------- Level screen ---------- */
  .level-topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .back-btn{background:var(--white);border:none;border-radius:14px;width:44px;height:44px;font-size:1.2rem;box-shadow:0 3px 0 var(--grey);cursor:pointer;flex:none;}
  .level-title{font-size:1.25rem;flex:1;}
  .level-title span{display:block;font-size:0.8rem;color:#8a8195;font-weight:600;}
  .progress-track{height:12px;background:var(--white);border-radius:8px;overflow:hidden;box-shadow:inset 0 0 0 2px var(--grey);margin-bottom:18px;}
  .progress-fill{height:100%;background:var(--teal);border-radius:8px;transition:width .3s ease;}

  .hint-text{text-align:center;color:#6b6178;font-weight:700;margin-bottom:14px;font-size:1.02rem;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px,1fr));gap:14px;margin-bottom:20px;}
  .letter-card{
    background:var(--white);border-radius:22px;padding:18px 8px 14px;text-align:center;
    box-shadow:0 5px 0 var(--grey);cursor:pointer;position:relative;
  }
  .letter-card.seen{box-shadow:0 5px 0 var(--green-dark);background:#eefff5;}
  .letter-card:active{transform:translateY(5px);box-shadow:0 0 0;}
  .letter-big{font-size:2.4rem;font-weight:800;color:var(--coral);}
  .letter-emoji{font-size:2rem;margin:4px 0;}
  .letter-word{font-size:0.85rem;font-weight:700;color:#6b6178;}
  .seen-badge{position:absolute;top:-6px;right:-6px;background:var(--green);color:#fff;border-radius:50%;width:24px;height:24px;font-size:0.8rem;display:flex;align-items:center;justify-content:center;}

  .word-card .letter-big{font-size:1.7rem;}
  .syll-part{padding:0 2px;border-radius:6px;}
  .syll-a{color:var(--coral);}
  .syll-b{color:var(--teal);}
  .syll-c{color:var(--purple);}
  .syll-d{color:var(--pink-dark);}

  .sentence-card{grid-column:1/-1;text-align:left;padding:20px;}
  .sentence-card .letter-big{font-size:1.5rem;line-height:1.5;}

  /* ---------- Game round ---------- */
  .game-box{background:var(--white);border-radius:26px;padding:26px 18px;text-align:center;box-shadow:0 6px 0 var(--grey);margin-bottom:20px;}
  .round-counter{font-weight:800;color:#8a8195;font-size:0.9rem;margin-bottom:10px;}
  .prompt-emoji{font-size:4.5rem;margin:6px 0;}
  .prompt-text{font-size:1.6rem;font-weight:800;margin:6px 0 14px;color:var(--ink);}
  .speaker-btn{
    background:var(--purple);color:#fff;border:none;border-radius:18px;
    padding:14px 22px;font-size:1.1rem;font-weight:800;box-shadow:0 5px 0 var(--purple-dark);
    cursor:pointer;margin-bottom:6px;
  }
  .speaker-btn:active{transform:translateY(5px);box-shadow:0 0 0;}
  .question-label{font-weight:700;color:#6b6178;margin:14px 0 10px;}
  .options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;}
  .option-btn{
    background:var(--cream);border:3px solid var(--grey);border-radius:18px;
    padding:16px 8px;font-family:inherit;font-size:1.3rem;font-weight:800;color:var(--ink);
    cursor:pointer;transition:transform .08s ease;
  }
  .option-btn:active{transform:scale(0.96);}
  .option-btn.correct{background:var(--green);border-color:var(--green-dark);color:#fff;}
  .option-btn.wrong{background:var(--pink);border-color:var(--pink-dark);color:#fff;}
  .option-btn:disabled{cursor:default;}
  .feedback-msg{margin-top:14px;font-weight:800;font-size:1.05rem;min-height:1.4em;}
  .feedback-msg.good{color:var(--green-dark);}
  .feedback-msg.bad{color:var(--pink-dark);}

  /* ---------- Summary ---------- */
  .summary-box{text-align:center;padding:20px 10px;}
  .summary-stars{font-size:3rem;letter-spacing:6px;margin:14px 0;}
  .summary-msg{font-size:1.3rem;font-weight:800;color:var(--coral);margin-bottom:6px;}
  .summary-sub{color:#6b6178;font-weight:600;margin-bottom:24px;}
  .summary-actions{display:flex;flex-direction:column;gap:12px;max-width:300px;margin:0 auto;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(58,48,66,0.5);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal-overlay.hidden{display:none;}
  .modal-box{background:#fff;border-radius:24px;padding:24px;max-width:340px;width:100%;text-align:center;}
  .modal-box h3{margin-bottom:14px;color:var(--coral);}
  .modal-box p{color:#6b6178;font-weight:600;margin-bottom:18px;font-size:0.95rem;}
  .modal-actions{display:flex;flex-direction:column;gap:10px;}

  /* ---------- Confetti ---------- */
  #confetti-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60;}
  .confetti-piece{
    position:absolute;top:-20px;width:10px;height:14px;
    animation-name:fall;animation-timing-function:ease-in;animation-fill-mode:forwards;
    border-radius:2px;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);opacity:0.9;}
  }

  @media (prefers-reduced-motion: reduce){
    .mascot{animation:none;}
    .confetti-piece{animation:none;display:none;}
    .current-badge{animation:none;}
  }
</style>
</head>
<body>

<div id="app">

  <!-- ===== PANTALLA: NOMBRE ===== -->
  <div id="screen-name" class="screen active">
    <div class="mascot">🦉</div>
    <h1>¡Hola! Soy Bubo</h1>
    <p>Voy a ayudarte a aprender a leer.<br>¿Cómo te llamas?</p>
    <input type="text" id="name-input" class="name-input" placeholder="Escribe tu nombre" maxlength="18">
    <button class="btn btn-coral btn-block" id="start-btn" style="max-width:320px;">Empezar a jugar 🚀</button>
  </div>

  <!-- ===== PANTALLA: MAPA DE NIVELES ===== -->
  <div id="screen-map" class="screen">
    <div class="top-row">
      <div class="greeting" id="map-greeting">¡Hola!<span>Elige un nivel</span></div>
      <button class="gear-btn" id="gear-btn" title="Ajustes">⚙️</button>
    </div>
    <div class="stars-total" id="stars-total" style="margin-bottom:8px;">⭐ 0 estrellas</div>
    <div class="path" id="path-container"></div>
  </div>

  <!-- ===== PANTALLA: NIVEL (intro / juego / resumen) ===== -->
  <div id="screen-level" class="screen">
    <div class="level-topbar">
      <button class="back-btn" id="back-btn">←</button>
      <div class="level-title" id="level-title-box">Nivel<span>Subtítulo</span></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%;"></div></div>
    <div id="level-content"></div>
  </div>

</div>

<div id="confetti-layer"></div>

<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal-box">
    <h3>Ajustes ⚙️</h3>
    <p>Cambia el nombre o borra el progreso guardado en este dispositivo.</p>
    <div class="modal-actions">
      <button class="btn btn-teal btn-block" id="change-name-btn">Cambiar nombre</button>
      <button class="btn btn-purple btn-block" id="repeat-voice-btn">🔊 Probar la voz</button>
      <button class="btn btn-outline btn-block" id="reset-progress-btn" style="color:#E14E80;">Borrar progreso</button>
      <button class="btn btn-outline btn-block" id="close-settings-btn">Cerrar</button>
    </div>
  </div>
</div>

<script>

  "use strict";

  /* ================== CONTENIDO DE LOS NIVELES ================== */

  var PRAISE = ['¡Muy bien!','¡Genial!','¡Lo lograste!','¡Estupendo!','¡Eres una estrella!','¡Perfecto!','¡Bravo!'];

  /* ================== ESTADO Y GUARDADO ================== */
  var STORAGE_KEY = 'lectorAppData_v1';
  var data = loadData();

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { name:'', levels:{} };
  }
  function saveData(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
  }
  function isUnlocked(levelId){
    if(levelId === 1) return true;
    var prev = data.levels[levelId-1];
    return !!(prev && prev.completed);
  }
  function isNextUp(levelId){
    if(!isUnlocked(levelId)) return false;
    var cur = data.levels[levelId];
    if(cur && cur.completed) return false;
    if(levelId === 1) return true;
    var prev = data.levels[levelId-1];
    return !!(prev && prev.completed);
  }
  function totalStars(){
    var t = 0;
    for(var k in data.levels){ t += (data.levels[k].stars || 0); }
    return t;
  }
  function getLevel(id){
    for(var i=0;i<LEVELS.length;i++){ if(LEVELS[i].id === id) return LEVELS[i]; }
    return null;
  }

  /* ================== VOZ (Web Speech API) ================== */
  var voice = null;
  function pickVoice(){
    if(!('speechSynthesis' in window)) return null;
    var voices = window.speechSynthesis.getVoices() || [];
    var v = voices.find(function(v){ return v.lang === 'es-ES'; });
    if(!v) v = voices.find(function(v){ return v.lang && v.lang.indexOf('es') === 0; });
    return v || null;
  }
  if('speechSynthesis' in window){
    voice = pickVoice();
    window.speechSynthesis.onvoiceschanged = function(){ voice = pickVoice(); };
  }
  function speakSequence(parts, rate){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    parts.forEach(function(text){
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'es-ES';
      if(voice) u.voice = voice;
      u.rate = rate || 0.85;
      u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    });
  }
  function speak(text, rate){ speakSequence([text], rate); }

  /* ================== SONIDOS DE REFUERZO ================== */
  var audioCtx = null;
  function getCtx(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    return audioCtx;
  }
  function playTone(correct){
    var ctx = getCtx();
    if(!ctx) return;
    try{
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      var t0 = ctx.currentTime;
      if(correct){
        o.frequency.setValueAtTime(523.25, t0);
        o.frequency.setValueAtTime(659.25, t0+0.1);
        o.frequency.setValueAtTime(783.99, t0+0.2);
      } else {
        o.frequency.setValueAtTime(300, t0);
        o.frequency.setValueAtTime(240, t0+0.15);
      }
      g.gain.setValueAtTime(0.16, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0+0.4);
      o.start(t0); o.stop(t0+0.4);
    }catch(e){}
  }

  /* ================== CONFETI ================== */
  function launchConfetti(){
    var layer = document.getElementById('confetti-layer');
    var colors = ['#FF8552','#3DAFA5','#8E5DC9','#FFC93F','#FF6B9D','#52B788'];
    for(var i=0;i<40;i++){
      (function(){
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = (Math.random()*100) + 'vw';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        var dur = (2 + Math.random()*1.5);
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = (Math.random()*0.4) + 's';
        layer.appendChild(el);
        setTimeout(function(){ el.remove(); }, (dur+0.6)*1000);
      })();
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  /* ================== NAVEGACIÓN DE PANTALLAS ================== */
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  /* ================== PANTALLA: NOMBRE ================== */
  var nameInput = document.getElementById('name-input');
  document.getElementById('start-btn').addEventListener('click', function(){
    var n = nameInput.value.trim();
    data.name = n || 'Peque';
    saveData();
    speak('Hola ' + data.name + '. Vamos a aprender a leer.');
    renderMap();
    showScreen('screen-map');
  });

  /* ================== PANTALLA: MAPA ================== */
  function renderMap(){
    document.getElementById('map-greeting').innerHTML =
      '¡Hola, ' + escapeHtml(data.name) + '! <span>Elige un nivel</span>';
    document.getElementById('stars-total').textContent = '⭐ ' + totalStars() + ' estrellas';

    var container = document.getElementById('path-container');
    container.innerHTML = '';

    WORLDS.forEach(function(world){
      var block = document.createElement('div');
      block.className = 'world-block ' + world.key.replace('w','world-');

      var banner = document.createElement('div');
      banner.className = 'world-banner';
      banner.innerHTML =
        '<div class="w-icon">' + world.icon + '</div>' +
        '<div class="w-text">' +
          '<div class="w-title">' + escapeHtml(world.title) + '</div>' +
          '<div class="w-sub">' + escapeHtml(world.subtitle) + '</div>' +
        '</div>';
      block.appendChild(banner);

      var trail = document.createElement('div');
      trail.className = 'trail';

      var levelsInWorld = LEVELS.filter(function(l){ return l.id >= world.from && l.id <= world.to; });
      levelsInWorld.forEach(function(level, idx){
        var row = document.createElement('div');
        row.className = 'stone-row ' + (idx % 2 === 0 ? 'left' : 'right');

        var unlocked = isUnlocked(level.id);
        var record = data.levels[level.id];
        var completed = !!(record && record.completed);
        var stars = (record && record.stars) || 0;
        var nextUp = isNextUp(level.id);

        var stone = document.createElement('div');
        stone.className = 'stone ' + (completed ? 'completed' : (unlocked ? 'unlocked' : 'locked'));
        var starsStr = completed ? ('★★★'.slice(0,stars) + '☆☆☆'.slice(0, 3-stars)) : '';
        stone.innerHTML =
          (nextUp ? '<div class="current-badge">¡Aquí! 👉</div>' : '') +
          '<div class="stone-icon">' + level.icon + '</div>' +
          '<div class="stone-title">' + escapeHtml(level.title) + '</div>' +
          (completed ? '<div class="stone-stars">' + starsStr + '</div>' : '') +
          (!unlocked ? '<div class="lock-badge">🔒</div>' : '');

        if(unlocked){
          stone.addEventListener('click', function(){ openLevel(level.id); });
        }
        row.appendChild(stone);
        trail.appendChild(row);

        // decoraciones ocasionales entre piedras
        if(idx < levelsInWorld.length - 1 && world.deco && world.deco.length){
          var dRow = document.createElement('div');
          dRow.style.textAlign = idx % 2 === 0 ? 'right' : 'left';
          dRow.style.fontSize = '1.3rem';
          dRow.style.margin = '-14px 26px 4px';
          dRow.style.opacity = '0.7';
          dRow.textContent = world.deco[idx % world.deco.length];
          trail.appendChild(dRow);
        }
      });

      block.appendChild(trail);
      container.appendChild(block);
    });

    var flag = document.createElement('div');
    flag.className = 'finish-flag';
    var allDone = LEVELS.every(function(l){ return data.levels[l.id] && data.levels[l.id].completed; });
    flag.textContent = allDone ? '🏆 ¡Completaste todo el mapa!' : '🏁';
    container.appendChild(flag);
  }

  /* ================== PANTALLA DE NIVEL ================== */
  var currentLevel = null;
  var introSeen = {};
  var gameState = null;

  function openLevel(id){
    currentLevel = getLevel(id);
    introSeen = {};
    gameState = null;
    renderIntro();
    showScreen('screen-level');
  }

  document.getElementById('back-btn').addEventListener('click', function(){
    if(('speechSynthesis' in window)) window.speechSynthesis.cancel();
    renderMap();
    showScreen('screen-map');
  });

  function setLevelHeader(subtitleText, progressPct){
    document.getElementById('level-title-box').innerHTML =
      escapeHtml(currentLevel.icon + '  ' + currentLevel.title) +
      '<span>' + escapeHtml(subtitleText) + '</span>';
    document.getElementById('progress-fill').style.width = progressPct + '%';
  }

  function renderIntro(){
    setLevelHeader(currentLevel.subtitle, 0);
    var content = document.getElementById('level-content');
    var type = currentLevel.type;

    var hint = type === 'letters' ? 'Toca cada tarjeta para escucharla'
             : type === 'words' ? 'Toca cada palabra para escucharla'
             : 'Toca cada frase para escucharla';

    var html = '<div class="hint-text">' + hint + '</div><div class="card-grid" id="intro-grid">';

    currentLevel.items.forEach(function(item, i){
      if(type === 'letters'){
        html += '<div class="letter-card" data-i="' + i + '">' +
          '<div class="letter-big">' + escapeHtml(item.text) + '</div>' +
          '<div class="letter-emoji">' + item.emoji + '</div>' +
          '<div class="letter-word">' + escapeHtml(item.word) + '</div>' +
          '</div>';
      } else if(type === 'words'){
        var sylls = item.syll.map(function(s,k){
          var cls = ['syll-a','syll-b','syll-c','syll-d'][k % 4];
          return '<span class="syll-part ' + cls + '">' + escapeHtml(s) + '</span>';
        }).join('');
        html += '<div class="letter-card word-card" data-i="' + i + '">' +
          '<div class="letter-big">' + sylls + '</div>' +
          '<div class="letter-emoji">' + item.emoji + '</div>' +
          '</div>';
      } else {
        html += '<div class="letter-card sentence-card" data-i="' + i + '">' +
          '<div class="letter-big">' + item.emoji + '&nbsp; ' + escapeHtml(item.text) + '</div>' +
          '</div>';
      }
    });
    html += '</div>';
    html += '<button class="btn btn-coral btn-block" id="play-btn">¡A jugar! 🎮</button>';
    content.innerHTML = html;

    document.querySelectorAll('#intro-grid .letter-card').forEach(function(card){
      card.addEventListener('click', function(){
        var i = parseInt(card.getAttribute('data-i'), 10);
        var item = currentLevel.items[i];
        introSeen[i] = true;
        card.classList.add('seen');
        if(!card.querySelector('.seen-badge')){
          var badge = document.createElement('div');
          badge.className = 'seen-badge';
          badge.textContent = '✓';
          card.appendChild(badge);
        }
        if(currentLevel.type === 'letters'){
          speakSequence([item.text, item.word]);
        } else if(currentLevel.type === 'words'){
          speak(item.text);
        } else {
          speak(item.text, 0.8);
        }
      });
    });

    document.getElementById('play-btn').addEventListener('click', function(){
      startGame();
    });
  }

  /* ---------- Juego (rondas) ---------- */
  function buildOptions(correctIdx){
    var items = currentLevel.items;
    var pool = items.map(function(it,i){ return i; }).filter(function(i){ return i !== correctIdx; });
    pool = shuffle(pool).slice(0, Math.min(3, pool.length));
    var optionIdxs = shuffle(pool.concat([correctIdx]));
    return optionIdxs;
  }

  function startGame(){
    var order = shuffle(currentLevel.items.map(function(it,i){ return i; }));
    gameState = { order: order, round: 0, wrongAttempts: 0, correctFirstTry: 0, attemptedThisRound:false };
    renderRound();
  }

  function renderRound(){
    var total = gameState.order.length;
    var pct = Math.round((gameState.round / total) * 100);
    setLevelHeader('Ronda ' + (gameState.round+1) + ' de ' + total, pct);

    var idx = gameState.order[gameState.round];
    var item = currentLevel.items[idx];
    var type = currentLevel.type;
    gameState.attemptedThisRound = false;

    var content = document.getElementById('level-content');
    var html = '<div class="game-box">';
    html += '<div class="round-counter">Ronda ' + (gameState.round+1) + ' de ' + total + '</div>';

    if(type === 'letters'){
      html += '<div class="prompt-emoji">' + item.emoji + '</div>';
      html += '<div class="prompt-text">' + escapeHtml(item.word) + '</div>';
      html += '<button class="speaker-btn" id="hear-btn">🔊 Escuchar</button>';
      html += '<div class="question-label">¿Con qué sílaba empieza?</div>';
    } else if(type === 'words'){
      html += '<div class="prompt-emoji">' + item.emoji + '</div>';
      html += '<button class="speaker-btn" id="hear-btn">🔊 Escuchar palabra</button>';
      html += '<div class="question-label">¿Qué palabra escuchaste?</div>';
    } else {
      html += '<div class="prompt-text">' + escapeHtml(item.text) + '</div>';
      html += '<button class="speaker-btn" id="hear-btn">🔊 Escuchar frase</button>';
      html += '<div class="question-label">¿Qué dibujo va con la frase?</div>';
    }

    var optionIdxs = buildOptions(idx);
    html += '<div class="options-grid" id="options-grid">';
    optionIdxs.forEach(function(oi){
      var opt = currentLevel.items[oi];
      var label = type === 'letters' ? opt.text : (type === 'words' ? opt.text : opt.emoji);
      html += '<button class="option-btn" data-idx="' + oi + '">' + escapeHtml(label) + '</button>';
    });
    html += '</div>';
    html += '<div class="feedback-msg" id="feedback-msg"></div>';
    html += '</div>';

    content.innerHTML = html;

    document.getElementById('hear-btn').addEventListener('click', function(){
      if(type === 'letters'){ speakSequence([item.text, item.word]); }
      else if(type === 'words'){ speak(item.text); }
      else { speak(item.text, 0.8); }
    });
    // Reproduce automáticamente al entrar a la ronda
    if(type === 'letters'){ speakSequence([item.text, item.word]); }
    else if(type === 'words'){ speak(item.text); }
    else { speak(item.text, 0.8); }

    document.querySelectorAll('#options-grid .option-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ handleAnswer(btn, idx); });
    });
  }

  function handleAnswer(btn, correctIdx){
    var chosen = parseInt(btn.getAttribute('data-idx'), 10);
    var feedback = document.getElementById('feedback-msg');
    if(chosen === correctIdx){
      btn.classList.add('correct');
      document.querySelectorAll('#options-grid .option-btn').forEach(function(b){ b.disabled = true; });
      feedback.className = 'feedback-msg good';
      feedback.textContent = PRAISE[Math.floor(Math.random()*PRAISE.length)] + ' ' + '🎉';
      playTone(true);
      if(!gameState.attemptedThisRound){ gameState.correctFirstTry++; }
      setTimeout(function(){
        gameState.round++;
        if(gameState.round >= gameState.order.length){
          finishGame();
        } else {
          renderRound();
        }
      }, 1100);
    } else {
      btn.classList.add('wrong');
      btn.disabled = true;
      gameState.wrongAttempts++;
      gameState.attemptedThisRound = true;
      feedback.className = 'feedback-msg bad';
      feedback.textContent = ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)] + ' 💪';
      playTone(false);
    }
  }

  function finishGame(){
    var total = gameState.order.length;
    var wrong = gameState.wrongAttempts;
    var stars = wrong === 0 ? 3 : (wrong <= Math.ceil(total/2) ? 2 : 1);

    var record = data.levels[currentLevel.id] || {};
    var bestStars = Math.max(record.stars || 0, stars);
    data.levels[currentLevel.id] = { completed:true, stars: bestStars };
    saveData();

    setLevelHeader('¡Nivel completado!', 100);
    var content = document.getElementById('level-content');
    var starsStr = '★★★'.slice(0,stars) + '☆☆☆'.slice(0, 3-stars);
    var msg = stars === 3 ? '¡Perfecto!' : (stars === 2 ? '¡Muy bien hecho!' : '¡Lo lograste!');

    var nextLevel = getLevel(currentLevel.id + 1);
    var html = '<div class="summary-box">';
    html += '<div class="summary-msg">' + msg + '</div>';
    html += '<div class="summary-stars">' + starsStr + '</div>';
    html += '<div class="summary-sub">Completaste "' + escapeHtml(currentLevel.title) + '"</div>';
    html += '<div class="summary-actions">';
    html += '<button class="btn btn-yellow btn-block" id="retry-btn">🔁 Repetir nivel</button>';
    if(nextLevel){
      html += '<button class="btn btn-teal btn-block" id="next-btn">Siguiente nivel →</button>';
    }
    html += '<button class="btn btn-outline btn-block" id="map-btn">🗺️ Volver al mapa</button>';
    html += '</div></div>';
    content.innerHTML = html;

    if(stars >= 2){ launchConfetti(); }

    document.getElementById('retry-btn').addEventListener('click', function(){ openLevel(currentLevel.id); });
    document.getElementById('map-btn').addEventListener('click', function(){
      renderMap();
      showScreen('screen-map');
    });
    if(nextLevel){
      document.getElementById('next-btn').addEventListener('click', function(){ openLevel(nextLevel.id); });
    }
  }

  /* ================== AJUSTES ================== */
  var modal = document.getElementById('settings-modal');
  document.getElementById('gear-btn').addEventListener('click', function(){ modal.classList.remove('hidden'); });
  document.getElementById('close-settings-btn').addEventListener('click', function(){ modal.classList.add('hidden'); });
  document.getElementById('repeat-voice-btn').addEventListener('click', function(){
    speak('Hola ' + data.name + '. Esta es mi voz.');
  });
  document.getElementById('change-name-btn').addEventListener('click', function(){
    modal.classList.add('hidden');
    nameInput.value = data.name === 'Peque' ? '' : data.name;
    showScreen('screen-name');
  });
  document.getElementById('reset-progress-btn').addEventListener('click', function(){
    var ok = window.confirm('¿Seguro que quieres borrar todo el progreso guardado?');
    if(ok){
      data = { name:data.name, levels:{} };
      saveData();
      modal.classList.add('hidden');
      renderMap();
      showScreen('screen-map');
    }
  });
  modal.addEventListener('click', function(e){
    if(e.target === modal){ modal.classList.add('hidden'); }
  });

  /* ================== INICIO ================== */
  if(data.name){
    nameInput.value = data.name;
    renderMap();
    showScreen('screen-map');
  } else {
    showScreen('screen-name');
  }

})();
</script>
</body>
</html>
